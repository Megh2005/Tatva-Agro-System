<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef7e6"/>
      <stop offset="100%" stop-color="#fdf6df"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="140" height="140" fill="url(#sky2)"/>
  <ellipse cx="70" cy="128" rx="55" ry="10" fill="#8a6b3d" opacity="0.5"/>
  <rect x="0" y="112" width="140" height="28" fill="#7a9c4a"/>

  <!-- sun -->
  <circle cx="112" cy="26" r="14" fill="#ffe28a">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- growth stages loop: seed -> sprout -> plant -> mature -> fade back -->
  <g transform="translate(70,116)">
    <!-- seed -->
    <ellipse cx="0" cy="-2" rx="5" ry="3.5" fill="#7a5a2e">
      <animate attributeName="opacity" values="1;1;0;0;0;1" keyTimes="0;0.08;0.15;0.9;0.97;1" dur="6s" repeatCount="indefinite"/>
    </ellipse>

    <!-- growing plant, scales up from ground -->
    <g>
      <animateTransform attributeName="transform" type="scale"
        values="1,0.02;1,0.02;1,1;1,1;1,0.02;1,0.02"
        keyTimes="0;0.12;0.45;0.85;0.95;1"
        calcMode="spline"
        keySplines="0.3 0 0.6 1;0.3 0 0.6 1;0.3 0 0.6 1;0.3 0 0.6 1;0.3 0 0.6 1"
        dur="6s" repeatCount="indefinite"/>
      <path d="M0,0 Q-4,-24 0,-46" stroke="#2f5d2a" stroke-width="3.4" fill="none" stroke-linecap="round"/>
      <path d="M0,-18 Q-18,-24 -25,-12" stroke="#3d7a34" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M0,-24 Q18,-30 24,-18" stroke="#3d7a34" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M0,-34 Q-14,-38 -18,-28" stroke="#4c8a3f" stroke-width="2.6" fill="none" stroke-linecap="round"/>
      <path d="M0,-36 Q14,-40 17,-30" stroke="#4c8a3f" stroke-width="2.6" fill="none" stroke-linecap="round"/>
      <ellipse cx="0" cy="-45" rx="4.5" ry="8" fill="#d8b64f">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.6;0.9;1" dur="6s" repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>
</svg>

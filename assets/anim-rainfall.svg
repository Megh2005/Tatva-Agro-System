<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9d6e3"/>
      <stop offset="100%" stop-color="#e7edf3"/>
    </linearGradient>
    <linearGradient id="grnd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fae4d"/>
      <stop offset="100%" stop-color="#5f8a3a"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="140" height="90" fill="url(#sky)"/>
  <rect x="0" y="90" width="140" height="50" fill="url(#grnd)"/>

  <!-- cloud -->
  <g fill="#9fb0bf" opacity="0.9">
    <ellipse cx="45" cy="30" rx="22" ry="12"/>
    <ellipse cx="65" cy="24" rx="18" ry="14"/>
    <ellipse cx="85" cy="32" rx="20" ry="11"/>
  </g>

  <!-- raindrops -->
  <g stroke="#7fa7c9" stroke-width="2.4" stroke-linecap="round">
    <line x1="35" y1="45" x2="31" y2="58">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,70" dur="1.1s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.1s" begin="0s" repeatCount="indefinite"/>
    </line>
    <line x1="55" y1="42" x2="51" y2="55">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,72" dur="1.3s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.3s" begin="0.3s" repeatCount="indefinite"/>
    </line>
    <line x1="75" y1="46" x2="71" y2="59">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,68" dur="1.0s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.0s" begin="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="95" y1="44" x2="91" y2="57">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,70" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="0.15s" repeatCount="indefinite"/>
    </line>
    <line x1="45" y1="50" x2="41" y2="63">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,65" dur="1.15s" begin="0.45s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.15s" begin="0.45s" repeatCount="indefinite"/>
    </line>
    <line x1="65" y1="48" x2="61" y2="61">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,66" dur="1.25s" begin="0.75s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.25s" begin="0.75s" repeatCount="indefinite"/>
    </line>
    <line x1="85" y1="49" x2="81" y2="62">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,64" dur="1.05s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;0" dur="1.05s" begin="0.9s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- swaying seedling -->
  <g transform="translate(70,110)">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="-6 0 0;6 0 0;-6 0 0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" dur="2.6s" repeatCount="indefinite"/>
      <path d="M0,0 Q-3,-14 0,-26" stroke="#2f5d2a" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M0,-16 Q-14,-20 -20,-10" stroke="#3d7a34" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M0,-20 Q14,-24 19,-14" stroke="#3d7a34" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
